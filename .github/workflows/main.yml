name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    env:
      DEFAULT_DB_URL: "https://drive.google.com/file/d/13cJresq-tUmD6dFH7xK9YV04c49_acCy/view?usp=drive_link"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate root project layout
        shell: bash
        run: |
          test -f "buildozer.spec"
          test -f "main.py"
          test -f "templates/index.html"
          test -f "static/css/style.css"
          test -f "static/js/script.js"
          echo "Using repository root as Android project directory"

      - name: Print source file hashes
        shell: bash
        run: |
          sha256sum main.py buildozer.spec templates/index.html static/css/style.css static/js/script.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer "cython<3.0" virtualenv gdown

      - name: Prepare database directory
        shell: bash
        run: |
          mkdir -p database

      - name: Download offline database from Google Drive
        shell: bash
        run: |
          DB_URL="${{ secrets.PRAAL_DB_URL }}"
          if [ -z "$DB_URL" ]; then
            DB_URL="${{ vars.PRAAL_DB_URL }}"
          fi
          if [ -z "$DB_URL" ]; then
            DB_URL="$DEFAULT_DB_URL"
          fi

          if [[ "$DB_URL" == *"drive.google.com"* ]]; then
            gdown --fuzzy "$DB_URL" -O database/offlinedata.db
          else
            curl -L "$DB_URL" -o database/offlinedata.db
          fi

          test -s database/offlinedata.db
          ls -lh database/offlinedata.db

      - name: Show project tree snapshot
        shell: bash
        run: |
          echo "Project tree for diagnostics:"
          find . -maxdepth 3 -type f | sort

      - name: Clean previous Android build cache
        shell: bash
        run: |
          rm -rf .buildozer bin

      - name: Build APK with Buildozer
        shell: bash
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-ci.log

      - name: Verify packaged app contents
        shell: bash
        run: |
          APK="$(ls -1 bin/*.apk | tail -n 1)"
          test -n "$APK"
          echo "Checking APK: $APK"

          unzip -p "$APK" assets/private.tar > private.tar
          tar -tf private.tar > private.list

          grep -qx 'main.pyc' private.list
          grep -qx 'database/offlinedata.db' private.list

          if ! grep -qx 'templates/index.html' private.list && ! grep -qx 'index.html' private.list; then
            echo "Missing index template in packaged APK" >&2
            exit 1
          fi

          if ! grep -qx 'static/css/style.css' private.list && ! grep -qx 'style.css' private.list; then
            echo "Missing style.css in packaged APK" >&2
            exit 1
          fi

          if ! grep -qx 'static/js/script.js' private.list && ! grep -qx 'script.js' private.list; then
            echo "Missing script.js in packaged APK" >&2
            exit 1
          fi

          rm -f private.tar private.list
          echo "APK packaging check passed."

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-Log
          path: buildozer-ci.log
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
