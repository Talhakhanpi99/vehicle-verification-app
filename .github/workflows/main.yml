name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  build-android:
    runs-on: ubuntu-22.04
    env:
      PROJECT_DIR: mobile_app
      DEFAULT_DB_URL: "https://drive.google.com/file/d/13cJresq-tUmD6dFH7xK9YV04c49_acCy/view?usp=sharing"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Android project directory
        shell: bash
        run: |
          test -d "$PROJECT_DIR"
          test -f "$PROJECT_DIR/buildozer.spec"
          test -f "$PROJECT_DIR/main.py"
          test -f "$PROJECT_DIR/templates/index.html"
          test -f "$PROJECT_DIR/static/css/style.css"
          echo "Using fixed project dir: $PROJECT_DIR"

      - name: Print source file hashes
        shell: bash
        run: |
          sha256sum "$PROJECT_DIR/main.py" "$PROJECT_DIR/buildozer.spec" "$PROJECT_DIR/templates/index.html"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer "cython<3.0" virtualenv gdown

      - name: Prepare database directory
        shell: bash
        run: |
          mkdir -p "$PROJECT_DIR/database"

      - name: Download offline database
        shell: bash
        run: |
          DB_URL="${{ secrets.PRAAL_DB_URL }}"
          if [ -z "$DB_URL" ]; then
            DB_URL="${{ vars.PRAAL_DB_URL }}"
          fi
          if [ -z "$DB_URL" ]; then
            DB_URL="$DEFAULT_DB_URL"
          fi

          if [[ "$DB_URL" == *"drive.google.com"* ]]; then
            gdown --fuzzy "$DB_URL" -O "$PROJECT_DIR/database/offlinedata.db"
          else
            curl -L "$DB_URL" -o "$PROJECT_DIR/database/offlinedata.db"
          fi

          test -s "$PROJECT_DIR/database/offlinedata.db"
          ls -lh "$PROJECT_DIR/database/offlinedata.db"

      - name: Show project tree snapshot
        shell: bash
        run: |
          echo "Project tree for diagnostics:"
          find "$PROJECT_DIR" -maxdepth 3 -type f | sort

      - name: Clean previous Android build cache
        shell: bash
        run: |
          rm -rf "$PROJECT_DIR/.buildozer" "$PROJECT_DIR/bin"

      - name: Build APK with Buildozer
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-ci.log

      - name: Verify packaged app contents
        shell: bash
        run: |
          APK="$(ls -1 "$PROJECT_DIR"/bin/*.apk | tail -n 1)"
          test -n "$APK"
          echo "Checking APK: $APK"

          unzip -p "$APK" assets/private.tar > private.tar
          tar -tf private.tar > private.list

          grep -qx 'main.pyc' private.list
          grep -qx 'database/offlinedata.db' private.list
          grep -qx 'templates/index.html' private.list
          grep -qx 'static/css/style.css' private.list
          grep -qx 'static/js/script.js' private.list

          rm -f private.tar private.list
          echo "APK packaging check passed."

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-Log
          path: mobile_app/buildozer-ci.log
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: mobile_app/bin/*.apk
