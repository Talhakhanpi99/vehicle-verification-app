name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    env:
      DEFAULT_DB_URL: "https://drive.google.com/file/d/1CkiJBrY70w6-hfJ75MWgumUhZnlYrsPj/view?usp=sharing"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate root project layout
        shell: bash
        run: |
          test -f "buildozer.spec"
          test -f "main.py"
          test -f "templates/index.html"
          test -f "static/css/style.css"
          test -f "static/js/script.js"
          test -f "update_config.json"
          echo "Using repository root as Android project directory"

      - name: Print source file hashes
        shell: bash
        run: |
          sha256sum main.py buildozer.spec templates/index.html static/css/style.css static/js/script.js update_config.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer "cython<3.0" virtualenv gdown
          pip install --upgrade gdown

      - name: Prepare update config
        shell: bash
        env:
          PRAAL_UPDATE_MANIFEST_URL: ${{ vars.PRAAL_UPDATE_MANIFEST_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re

          root = pathlib.Path('.')
          config_path = root / 'update_config.json'
          config = json.loads(config_path.read_text(encoding='utf-8-sig'))

          spec_text = (root / 'buildozer.spec').read_text(encoding='utf-8')
          match = re.search(r'^version = (.+)$', spec_text, re.MULTILINE)
          if not match:
              raise SystemExit('buildozer.spec version not found')

          app_version = match.group(1).strip()
          owner, repo = os.environ['GITHUB_REPOSITORY'].split('/', 1)
          default_manifest_url = f'https://{owner}.github.io/{repo}/praal-update.json'

          config['app_version'] = app_version
          config['manifest_url'] = os.environ.get('PRAAL_UPDATE_MANIFEST_URL', '').strip() or config.get('manifest_url', '').strip() or default_manifest_url

          config_path.write_text(json.dumps(config, indent=2) + '\n', encoding='utf-8')
          print('Prepared update_config.json')
          print(f"app_version={config['app_version']}")
          print(f"manifest_url={config['manifest_url']}")
          PY

      - name: Prepare database directory
        shell: bash
        run: |
          mkdir -p database

      - name: Download offline database from Google Drive
        shell: bash
        run: |
          DB_URL="${{ secrets.PRAAL_DB_URL }}"
          if [ -z "$DB_URL" ]; then
            DB_URL="${{ vars.PRAAL_DB_URL }}"
          fi
          if [ -z "$DB_URL" ]; then
            DB_URL="$DEFAULT_DB_URL"
          fi

          # If the secret/variable exists but is an empty string, fallback to default
          if [ -z "$DB_URL" ] || [ "$DB_URL" = '""' ] || [ "$DB_URL" = '""' ]; then
            DB_URL="${{ env.DEFAULT_DB_URL }}"
          fi

          if [[ "$DB_URL" == *"drive.google.com"* ]]; then
            gdown "$DB_URL" -O database/offlinedata.db
          else
            curl -L "$DB_URL" -o database/offlinedata.db
          fi

          test -s database/offlinedata.db
          ls -lh database/offlinedata.db

      - name: Show project tree snapshot
        shell: bash
        run: |
          echo "Project tree for diagnostics:"
          find . -maxdepth 3 -type f | sort

      - name: Clean previous Android build cache
        shell: bash
        run: |
          rm -rf .buildozer bin

      - name: Build APK with Buildozer
        shell: bash
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-ci.log

      - name: Verify packaged app contents
        shell: bash
        run: |
          APK="$(ls -1 bin/*.apk | tail -n 1)"
          test -n "$APK"
          echo "Checking APK: $APK"

          unzip -p "$APK" assets/private.tar > private.tar
          tar -tf private.tar > private.list

          grep -qx 'main.pyc' private.list
          grep -qx 'database/offlinedata.db' private.list
          grep -qx 'update_config.json' private.list

          if ! grep -qx 'templates/index.html' private.list && ! grep -qx 'index.html' private.list; then
            echo "Missing index template in packaged APK" >&2
            exit 1
          fi

          if ! grep -qx 'static/css/style.css' private.list && ! grep -qx 'style.css' private.list; then
            echo "Missing style.css in packaged APK" >&2
            exit 1
          fi

          if ! grep -qx 'static/js/script.js' private.list && ! grep -qx 'script.js' private.list; then
            echo "Missing script.js in packaged APK" >&2
            exit 1
          fi

          rm -f private.tar private.list
          echo "APK packaging check passed."

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-Log
          path: buildozer-ci.log
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
